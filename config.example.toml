# tsql Configuration File
# Copy this file to ~/.config/tsql/config.toml and customize as needed

# Display settings
[display]
# Show row numbers in the results grid
show_row_numbers = true

# Default column width in characters
default_column_width = 20

# Minimum column width
min_column_width = 4

# Maximum column width
max_column_width = 100

# Truncate long cell values with ellipsis
truncate_cells = true

# Show NULL values with a distinct indicator
show_null_indicator = true

# Text to display for NULL values
null_indicator = "NULL"

# Show borders around grid cells
show_borders = true

# Theme name (reserved for future use)
theme = "default"

# SQL generation settings (used by Schema panel templates, etc.)
[sql]
# Identifier formatting strategy for generated SQL:
# - "minimal": quote only when needed; schema-qualify only when needed
# - "qualified_quoted": always schema-qualify and quote identifiers
identifier_style = "minimal"

# Default LIMIT for generated SELECT templates
default_select_limit = 100

# Editor settings
[editor]
# Tab size in spaces
tab_size = 4

# Use spaces instead of tabs
expand_tabs = true

# Enable auto-indent
auto_indent = true

# Show line numbers in the query editor
line_numbers = true

# Enable syntax highlighting
syntax_highlighting = true

# Enable auto-completion
auto_completion = true

# Completion trigger delay in milliseconds
completion_delay_ms = 100

# Maximum history entries to keep
max_history = 1000

# Persist session state between launches (query, connection, UI state)
# When enabled, tsql remembers your query, active connection, sidebar
# visibility, and expanded schema nodes when you quit
persist_session = true

# Connection settings
[connection]
# Default database URL (can be overridden by DATABASE_URL env var or CLI arg)
# default_url = "postgres://user:password@localhost:5432/database"
# default_url = "mongodb://user:password@localhost:27017/database"

# Connection timeout in seconds
connect_timeout_secs = 10

# Query timeout in seconds (0 = no timeout)
query_timeout_secs = 0

# Maximum rows to fetch (0 = no limit)
max_rows = 0

# Auto-reconnect on connection loss
auto_reconnect = true

# Enable 1Password CLI integration for `password_onepassword` refs in
# connections. When enabled, `op` must be installed and available on PATH.
enable_onepassword = false

# Update checking
[updates]
# Enable update checks
enabled = true

# Check once during startup (non-blocking)
check_on_startup = true

# Release channel:
# - "stable": only stable releases
# - "prerelease": include prereleases
channel = "stable"

# Update mode:
# - "auto": notify + allow `:update apply` for standalone installs
# - "notify-only": check and show upgrade hints
# - "off": disable update checks
mode = "auto"

# Minimum interval between checks (hours)
interval_hours = 24

# Allow in-app apply only when running a standalone binary
allow_apply_for_standalone = true

# GitHub repository used for release checks
github_repo = "fcoury/tsql"

# AI assistant settings
[ai]
# Enable `:ai` command and `Ctrl+G` shortcut in query editor
enabled = false

# Provider backend:
# - "open_ai"            (OpenAI API)
# - "open_ai_compatible" (OpenAI-compatible endpoints)
# - "ollama"             (local Ollama)
# - "anthropic"          (Anthropic Claude API)
# - "google"             (Google Gemini API)
# - "openrouter"         (OpenRouter API)
provider = "open_ai"

# Model name for selected provider
model = "gpt-4o-mini"

# Sampling temperature and max output tokens
temperature = 0.1
max_tokens = 1024

# Request timeout in seconds
request_timeout_secs = 30

# Optional provider base URL override
# - OpenAI-compatible example: "http://localhost:1234/v1"
# - Ollama example: "http://localhost:11434"
# - Anthropic example: "https://api.anthropic.com"
# - Google Gemini example: "https://generativelanguage.googleapis.com"
# - OpenRouter example: "https://openrouter.ai/api/v1"
# base_url = "http://localhost:1234/v1"

# API key environment variable name (ignored by ollama)
# Common values:
# - OPENAI_API_KEY      (open_ai / open_ai_compatible)
# - ANTHROPIC_API_KEY   (anthropic)
# - GEMINI_API_KEY      (google)
# - OPENROUTER_API_KEY  (openrouter)
# If left as OPENAI_API_KEY while using another provider, tsql
# will automatically try that provider's default env var first.
api_key_env = "OPENAI_API_KEY"

# Prompt context controls
include_schema_context = true
max_schema_tables = 25
max_columns_per_table = 20

# Optional custom system prompts per engine
# system_prompt_postgres = "Return only PostgreSQL SQL."
# system_prompt_mongo = "Return only db.collection.op(...) or JSON command syntax."

# Clipboard settings
[clipboard]
# Clipboard backend:
# - "auto": On Linux Wayland, use wl-copy if available; on X11 or other platforms, use arboard
# - "arboard": Always use arboard (built-in clipboard integration)
# - "wl-copy": Always use wl-copy (requires wl-clipboard installed)
# - "disabled": Disable clipboard support
backend = "auto"

# Command name/path for wl-copy when backend is "wl-copy" or "auto"
# If wl-copy is not found, operations will fail with an error message
wl_copy_cmd = "wl-copy"

# Use the "primary" selection for wl-copy (passes -p; primary selection is typically
# used for middle-click paste, while the standard clipboard is used for Ctrl+V)
wl_copy_primary = false

# Trim the trailing newline for wl-copy (passes -n)
wl_copy_trim_newline = false

# Keymap settings
[keymap]
# Use vim-style keybindings
vim_mode = true

# Custom keybindings for normal mode
# Default: Ctrl+S executes the query (works in any mode/focus)
# [[keymap.normal]]
# key = "ctrl+s"
# action = "execute_query"
# description = "Execute the current query"

# Default: Ctrl+G opens AI query assistant
# [[keymap.normal]]
# key = "ctrl+g"
# action = "open_ai_assistant"
# description = "Open AI query assistant"

# Custom keybindings for grid navigation
# [[keymap.grid]]
# key = "ctrl+x"
# action = "export_csv"
# description = "Export results to CSV"

# Custom keybindings for connection form (add/edit connection modal)
# Default save key is Ctrl+S. If you have Ctrl+S mapped to something else
# (e.g., in tmux), you can remap the save action to another key.
# [[keymap.connection_form]]
# key = "ctrl+w"
# action = "save_connection"
# description = "Save the connection"

# Available connection_form actions:
# - save_connection: Save the connection (default: Ctrl+S)
# - test_connection: Test the connection (default: Ctrl+T)
# - clear_field: Clear the current field (default: Ctrl+U)
